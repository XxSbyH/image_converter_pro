name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 当推送 v* 格式的标签时触发
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
      
      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      
      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Flutter 依赖
        run: |
          cd frontend
          flutter pub get
      
      - name: 构建 Windows 应用
        run: |
          cd frontend
          flutter build windows --release
      
      - name: Python 后端依赖
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: 打包发布文件
        run: |
          # 创建发布目录
          mkdir release
          mkdir release/image-converter-pro
          
          # 复制前端构建产物
          xcopy frontend\build\windows\runner\Release release\image-converter-pro\ /E /I /Y
          
          # 复制后端文件
          mkdir release\image-converter-pro\backend
          xcopy backend release\image-converter-pro\backend /E /I /Y /EXCLUDE:.github\workflows\exclude.txt
          
          # 删除后端虚拟环境（如果存在）
          if exist release\image-converter-pro\backend\venv rmdir /s /q release\image-converter-pro\backend\venv
          
          # 创建启动脚本
          echo @echo off > release\image-converter-pro\start.bat
          echo echo 正在启动 Image Converter Pro... >> release\image-converter-pro\start.bat
          echo echo. >> release\image-converter-pro\start.bat
          echo if not exist "backend\venv\" ( >> release\image-converter-pro\start.bat
          echo     echo 首次运行，正在设置环境... >> release\image-converter-pro\start.bat
          echo     cd backend >> release\image-converter-pro\start.bat
          echo     python -m venv venv >> release\image-converter-pro\start.bat
          echo     call venv\Scripts\activate >> release\image-converter-pro\start.bat
          echo     pip install -r requirements.txt >> release\image-converter-pro\start.bat
          echo     cd .. >> release\image-converter-pro\start.bat
          echo ) >> release\image-converter-pro\start.bat
          echo start /B cmd /c "cd backend && venv\Scripts\activate && python main.py" >> release\image-converter-pro\start.bat
          echo timeout /t 3 /nobreak ^>nul >> release\image-converter-pro\start.bat
          echo start image_converter_pro.exe >> release\image-converter-pro\start.bat
          
          # 创建 README
          echo Image Converter Pro > release\image-converter-pro\README.txt
          echo. >> release\image-converter-pro\README.txt
          echo 使用方法: >> release\image-converter-pro\README.txt
          echo 1. 双击运行 start.bat >> release\image-converter-pro\README.txt
          echo 2. 首次运行会自动安装依赖，请耐心等待 >> release\image-converter-pro\README.txt
          echo 3. 需要安装 Python 3.10 或更高版本 >> release\image-converter-pro\README.txt
          echo. >> release\image-converter-pro\README.txt
          echo 项目主页: https://github.com/${{ github.repository }} >> release\image-converter-pro\README.txt
      
      - name: 压缩发布包
        run: |
          cd release
          Compress-Archive -Path image-converter-pro -DestinationPath image-converter-pro-windows-x64.zip
      
      - name: 上传构建产物
        uses: actions/upload-artifact@v3
        with:
          name: windows-release
          path: release/image-converter-pro-windows-x64.zip
      
      - name: 创建 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/image-converter-pro-windows-x64.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-backend:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
      
      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: 运行测试
        run: |
          cd backend
          pytest --cov=. --cov-report=xml
      
      - name: 上传覆盖率报告
        uses: codecov/codecov-action@v3
        with:
          file: backend/coverage.xml
          flags: backend
          name: backend-coverage

  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
      
      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      
      - name: 获取依赖
        run: |
          cd frontend
          flutter pub get
      
      - name: 运行测试
        run: |
          cd frontend
          flutter test --coverage
      
      - name: 上传覆盖率报告
        uses: codecov/codecov-action@v3
        with:
          file: frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage